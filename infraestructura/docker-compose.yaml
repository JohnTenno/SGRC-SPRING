version: '3.8'
services:
  db:
    image: mysql:8.0
    platform: linux/arm64
    container_name: sgrc_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: sgrc_db
      MYSQL_USER: sgrc_user
      MYSQL_PASSWORD: sgrc_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
volumes:
  db_data: