version: '3.8'
services:
  db:
    image: mysql:8.0
    platform: linux/arm64
    container_name: sgrc_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: sgrc_db
      MYSQL_USER: sgrc_user
      MYSQL_PASSWORD: sgrc_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  rabbitmq:
    image: rabbitmq:3-management
    container_name: sgrc_rabbitmq
    ports:
      - "5672:5672"    # AMQP (Spring Boot / Camel connect here)
      - "15672:15672"  # Management UI → http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

volumes:
  db_data:
