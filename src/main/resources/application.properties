spring.application.name=SGRC


# Spring Boot port
server.port=8080

# Database connection (Docker)
spring.datasource.url=jdbc:mysql://localhost:3306/sgrc_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=sgrc_user
spring.datasource.password=sgrc_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Apache Camel
camel.springboot.name=SGRC-Camel