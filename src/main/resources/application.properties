spring.application.name=SGRC


# Spring Boot port
server.port=3000

# Database connection (Docker)
spring.datasource.url=jdbc:mysql://localhost:3306/sgrc_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8&useUnicode=true
spring.datasource.username=sgrc_user
spring.datasource.password=sgrc_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Apache Camel
camel.springboot.name=SGRC-Camel

# JWT
jwt.secret=sgrc-super-secret-key-for-jwt-signing-must-be-at-least-32-chars
jwt.expiration=86400000