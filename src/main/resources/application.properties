spring.application.name=SGRC


# Puerto de spring boot
server.port=8080

# config de la conexión a la base a docker
spring.datasource.url=jdbc:mysql://localhost:3306/sgrc_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=sgrc_user
spring.datasource.password=sgrc_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true